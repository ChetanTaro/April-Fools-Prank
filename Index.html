<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Important Notice</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #000;
      color: #0f0;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      overflow: hidden;
    }
    .box {
      text-align: center;
      background: #111;
      padding: 30px;
      border-radius: 12px;
      box-shadow: 0 0 25px rgba(0,255,0,0.5);
    }
    button {
      margin-top: 20px;
      padding: 12px 25px;
      font-size: 16px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      background: #0f0;
      color: black;
      font-weight: bold;
    }
    #popup {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: black;
      display: none;
      justify-content: center;
      align-items: center;
      flex-direction: column;
      text-align: center;
    }
    .fake-error {
      font-size: 22px;
      color: #0f0;
      animation: blink 0.6s infinite;
    }
    @keyframes blink {
      0% {opacity: 1;}
      50% {opacity: 0.2;}
      100% {opacity: 1;}
    }
    .final {
      font-size: 28px;
      color: yellow;
      display: none;
      margin-top: 20px;
    }
  </style>
</head>
<body>
  <div class="box">
    <h2>⚠️ Government Security Alert</h2>
    <p>Device linked to suspicious activity under TRAI monitoring.</p>
    <button onclick="startPrank()">Scan Device</button>
  </div>

  <div id="popup">
    <div class="fake-error" id="message">Initializing scan...</div>
    <div class="final" id="finalMsg">😂 APRIL FOOLS Nisha Ma'am 😂</div>
  </div>

  <script>
    function startPrank() {
      document.querySelector('.box').style.display = 'none';
      const popup = document.getElementById('popup');
      popup.style.display = 'flex';

      // Try fullscreen (fake lock effect)
      if (document.documentElement.requestFullscreen) {
        document.documentElement.requestFullscreen();
      }

      const messages = [
        'Connecting to TRAI servers...',
        'Scanning WhatsApp chats...',
        'Accessing gallery...',
        'Uploading contacts...',
        'Blocking SIM card...',
        'Formatting device...'
      ];

      let i = 0;
      const msg = document.getElementById('message');
      const final = document.getElementById('finalMsg');

      const interval = setInterval(() => {
        if (i < messages.length) {
          msg.innerText = messages[i];
          i++;
        } else {
          clearInterval(interval);
          msg.style.display = 'none';
          final.style.display = 'block';

          // Exit fullscreen after reveal
          if (document.exitFullscreen) {
            document.exitFullscreen();
          }
        }
      }, 1500);
    }

    // Light annoyance (not too aggressive)
    setTimeout(() => {
      alert('⚠️ Warning: Unauthorized Activity Detected');
    }, 4000);
  </script>
</body>
</html>
