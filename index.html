<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Security Alert</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin: 0;
  font-family: Arial;
  background: black;
  color: #0f0;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

.box {
  text-align: center;
  background: #111;
  padding: 30px;
  border-radius: 10px;
}

button {
  padding: 12px 25px;
  background: #0f0;
  border: none;
  font-weight: bold;
}

#popup {
  position: fixed;
  top:0;left:0;
  width:100%;height:100%;
  background:black;
  display:none;
  flex-direction:column;
  justify-content:center;
  align-items:center;
}

#message {
  font-size:20px;
  animation: blink 0.6s infinite;
}

@keyframes blink {
  50% {opacity:0.3;}
}

#final {
  display:none;
  font-size:28px;
  color:yellow;
}

/* Fake camera */
.camera {
  position: fixed;
  top:10px;
  right:10px;
  color:red;
  display:none;
}

/* Fake call */
.call {
  display:none;
  position:fixed;
  top:0;left:0;
  width:100%;height:100%;
  background:black;
  color:white;
  justify-content:center;
  align-items:center;
  flex-direction:column;
}
</style>
</head>

<body>

<div class="box">
  <h2>⚠️ TRAI Security Alert</h2>
  <p>Suspicious activity detected</p>
  <button onclick="start()">Scan Device</button>
</div>

<div id="popup">
  <div id="message">Initializing...</div>
  <div id="final">😂 APRIL FOOLS Nisha Ma'am 😂</div>
</div>

<div class="camera">🔴 REC</div>

<div class="call" id="call">
  <h2>📞 Incoming Call</h2>
  <p>Telecom Department</p>
</div>

<script>

function speak(t){
  let s=new SpeechSynthesisUtterance(t);
  s.lang='en-IN';
  speechSynthesis.speak(s);
}

function vibrate(){
  if(navigator.vibrate){
    navigator.vibrate([500,200,500,200,500]);
  }
}

function start(){
  document.querySelector('.box').style.display='none';
  document.getElementById('popup').style.display='flex';

  let msg=document.getElementById('message');
  let final=document.getElementById('final');

  let steps=[
    "Connecting to TRAI server...",
    "Scanning WhatsApp...",
    "Accessing gallery...",
    "Uploading contacts...",
    "Blocking SIM...",
    "Formatting device..."
  ];

  let i=0;

  let interval=setInterval(()=>{
    if(i<steps.length){
      msg.innerText=steps[i];
      speak(steps[i]);
      vibrate();
      i++;
    } else {
      clearInterval(interval);

      // Camera effect
      document.querySelector('.camera').style.display='block';
      msg.innerText="📸 Camera Recording Started";
      speak("Camera recording started");

      setTimeout(()=>{

        // Fake call
        document.getElementById('call').style.display='flex';
        speak("Incoming call from telecom department");

        setTimeout(()=>{
          document.getElementById('call').style.display='none';

          // Freeze
          msg.innerText="⚠️ SYSTEM FREEZE DETECTED";
          speak("System freeze detected");

          document.body.style.pointerEvents='none';

          setTimeout(()=>{
            document.body.style.pointerEvents='auto';
            msg.style.display='none';
            final.style.display='block';
            speak("April Fools Nisha Ma'am");
          },15000);

        },4000);

      },3000);
    }
  },1500);
}

</script>

</body>
</html>
